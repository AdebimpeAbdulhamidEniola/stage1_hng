# fly.toml app configuration file generated for stage1-hng on 2026-04-15T20:40:09Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'stage1-hng'
primary_region = 'ams'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
